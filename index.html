<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원츠샵 몽블랑 각인 서비스 미리보기</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Nanum+Myeongjo&display=swap" rel="stylesheet">

<style>

body{
font-family:sans-serif;
background:white;
padding:30px 20px;
text-align:center;
color:#111;
}

.container{
max-width:420px;
margin:0 auto;
}

/* 상단 헤더 */

.page-header{
margin-bottom:30px;
}

.page-header h1{
font-size:24px;
margin-bottom:6px;
}

.page-header h2{
font-size:18px;
font-weight:normal;
color:#444;
margin-bottom:10px;
}

.page-desc{
font-size:14px;
color:#666;
line-height:1.5;
}

/* 입력창 */

input{
width:100%;
max-width:320px;
padding:12px;
font-size:18px;
margin-bottom:30px;
border:1px solid #ccc;
}

/* 미리보기 */

.preview{
font-size:42px;
margin-bottom:20px;
min-height:60px;
word-break:break-all;
}

/* 폰트 리스트 */

.font-list{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
max-width:420px;
margin:auto;
}

/* 버튼 */

.font-button{
border:1px solid #ddd;
background:white;
padding:14px 10px;
border-radius:6px;
cursor:pointer;
transition:0.15s;
text-align:center;
}

.font-button:hover{
background:#f5f5f5;
}

.font-button.active{
border:2px solid black;
}

/* 폰트 이름 */

.font-title{
font-size:18px;
margin-bottom:4px;
}

/* 폰트 설명 */

.font-desc{
font-size:12px;
color:#666;
}

/* 안내문구 */

.notice{
margin:25px auto 20px;
font-size:13px;
color:#555;
line-height:1.6;
text-align:left;
}

/* 모바일 */

@media (max-width:500px){

.preview{
font-size:34px;
}

.font-title{
font-size:16px;
}

/* 하단 이미지 */

.engraving-image{
margin:40px 0;
}

.engraving-image img{
width:420px;
max-width:100%;
height:auto;
border-radius:8px;
}

</style>

<style>

/* 웹폰트 */

@font-face{
font-family:"Jaemin";
src:url("Jaemin.woff") format("woff");
  font-display:swap;
}

@font-face{
font-family:"Freestyle-Script";
src:url("Freestyle-Script.woff") format("woff");
font-display:swap;
}
  
@font-face{
font-family:"AlexBrush-Regular";
src:url("AlexBrush-Regular.ttf") format("truetype");
font-display:swap;
}
</style>

</head>

<body>
<div class="container">
<div class="page-header">

<h1>원츠샵 몽블랑 각인 서비스</h1>

<h2>각인 시안 미리보기</h2>

<p class="page-desc">
각인하실 문구를 입력하고 폰트를 선택하면<br>
미리 각인 시안을 확인할 수 있습니다.<br>
영어로 작성 시 대소문자 섞는 걸 추천드립니다!
</p>

</div>

<input
type="text"
id="textInput"
placeholder="각인 문구 입력 (최대 15자)"
>

<div id="previewText" class="preview">
미리보기 Preview
</div>

<div class="font-list">

<button class="font-button" data-font="Nanum Myeongjo">
<div class="font-title" style="font-family:'Nanum Myeongjo'">
명조폰트
</div>
<div class="font-desc">
(한글 · 영어 가능)
</div>
</button>

<button class="font-button" data-font="Nanum Gothic">
<div class="font-title" style="font-family:'Nanum Gothic'">
고딕폰트
</div>
<div class="font-desc">
(한글 · 영어 가능)
</div>
</button>

<button class="font-button" data-font="Jaemin">
<div class="font-title" style="font-family:'Jaemin'">
한글폰트
</div>
<div class="font-desc">
(한글 · 영어 가능)
</div>
</button>

<button class="font-button" data-font="Freestyle-Script">
<div class="font-title" style="font-family:'Freestyle-Script'">
영어폰트
</div>
<div class="font-desc">
(영어만 가능)
</div>
</button>

<button class="font-button" data-font="Vladimir-Script">
<div class="font-title" style="font-family:'Vladimir-Script'">
필기폰트
</div>
<div class="font-desc">
(영어만 가능)
</div>
</button>

</div>


<div class="notice">

※ 특수문자 및 너무 긴 문장, 2줄 이상은 각인 불가합니다.<br>
※ 폰트 선택에 참고용으로 보는 미리보기입니다.<br>
※ 실제 각인 시안의 글자는 길이나 폭이 미세하게 달라질 수 있습니다.

</div>

<div class="engraving-image">
<img src="./engraving-image.jpg" width="420">
</div>

</div>


<script>

const input = document.getElementById("textInput")
const preview = document.getElementById("previewText")
const buttons = document.querySelectorAll(".font-button")

input.addEventListener("input", () => {

preview.textContent = input.value || "미리보기"

})

buttons.forEach(button => {

button.addEventListener("click", () => {

buttons.forEach(b=>b.classList.remove("active"))

button.classList.add("active")

const font = button.dataset.font
preview.style.fontFamily = font

})

})

</script>

</body>
</html>
